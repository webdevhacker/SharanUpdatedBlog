# Rate limiting zone — defined in http block (add to /etc/nginx/nginx.conf http block)
# limit_req_zone $binary_remote_addr zone=techblog_api:10m rate=30r/m;
# limit_req_zone $binary_remote_addr zone=techblog_auth:10m rate=10r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ─── SSL — Let's Encrypt / Certbot ───────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options              "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options       "nosniff"                      always;
    add_header X-XSS-Protection            "1; mode=block"                always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy     "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self'; frame-ancestors 'none';" always;

    # ─── Gzip Compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;
    gzip_min_length 1000;

    # ─── Root — Serve Vite Build (React SPA) ──────────────────────────────────
    root  /var/www/techblog/client/dist;
    index index.html;

    # SPA fallback — all non-API, non-static routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Static assets with long cache (Vite uses content-hashed filenames)
    location ~* \.(js|css|woff2|woff|ttf|eot|otf|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # ─── API Proxy → Node.js Backend ──────────────────────────────────────────
    location /api/ {
        # General API rate limit
        limit_req zone=techblog_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass          http://127.0.0.1:5000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        'upgrade';
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  60s;

        # Hide backend headers
        proxy_hide_header   X-Powered-By;
    }

    # Stricter rate limit for auth endpoints
    location /api/auth/ {
        limit_req zone=techblog_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass          http://127.0.0.1:5000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # Serve uploaded files (avatars, images)
    location /uploads/ {
        alias /var/www/techblog/server/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Block sensitive files ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|log|bak|sql|conf|ini|sh|git)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/techblog-access.log;
    error_log  /var/log/nginx/techblog-error.log warn;

    # ─── Limits ───────────────────────────────────────────────────────────────
    client_max_body_size 10M;
    keepalive_timeout    65;
}
